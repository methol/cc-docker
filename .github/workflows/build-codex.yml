# 构建并推送 codex-docker 镜像到 Docker Hub
# 镜像 tag 与镜像内 OpenAI Codex 版本号保持一致(single source of truth)
#
# 需在仓库 Settings → Secrets and variables → Actions 配置两个 secret:
#   DOCKERHUB_USERNAME  Docker Hub 用户名(methol)
#   DOCKERHUB_TOKEN     Docker Hub Access Token(在 Docker Hub → Account Settings
#                       → Personal access tokens 生成,勾 Read & Write)

name: Build & Push codex-docker

on:
  # 手动触发:可指定版本,可强制重建
  workflow_dispatch:
    inputs:
      version:
        description: "Codex 版本(留空 = 取 npm latest)"
        required: false
        default: ""
      force:
        description: "tag 已存在也强制重建"
        type: boolean
        default: false
  # 定时:每天 03:00 UTC(北京 11:00)检查 npm 是否有新版
  schedule:
    - cron: "0 3 * * *"
  # Dockerfile / workflow 改动时重建
  push:
    branches: [main]
    paths:
      - codex/Dockerfile
      - .github/workflows/build-codex.yml

permissions:
  contents: read

concurrency:
  group: build-codex-docker
  cancel-in-progress: false

env:
  IMAGE: methol/codex-docker

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 解析 Codex 版本
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "latest" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(npm view @openai/codex version)"
          fi
          [ -n "$VERSION" ] || { echo "❌ 无法解析 Codex 版本"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Codex 版本: $VERSION"

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 检查 tag 是否已存在
        id: check
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if docker manifest inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ $IMAGE:$VERSION 已存在"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 $IMAGE:$VERSION 不存在"
          fi

      - name: 决定是否构建
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE: ${{ github.event.inputs.force }}
          EXISTS: ${{ steps.check.outputs.exists }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            BUILD=true
          elif [ "$FORCE" = "true" ]; then
            BUILD=true
          elif [ "$EXISTS" = "false" ]; then
            BUILD=true
          else
            BUILD=false
          fi
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "🔧 build=$BUILD"

      - name: Set up QEMU
        if: steps.decide.outputs.build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.decide.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送
        if: steps.decide.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: codex
          platforms: linux/amd64,linux/arm64
          build-args: |
            CODEX_VERSION=${{ steps.ver.outputs.version }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest

      - name: 校验镜像内版本与 tag 一致
        if: steps.decide.outputs.build == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          OUT="$(docker run --rm "$IMAGE:$VERSION" codex --version)"
          echo "镜像内 codex --version: $OUT"
          echo "$OUT" | grep -q "$VERSION" || { echo "❌ 版本不一致!"; exit 1; }
          echo "✅ 镜像内版本与 tag 一致: $VERSION"

      - name: 跳过说明
        if: steps.decide.outputs.build != 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: echo "⏭️ 最新版 $VERSION 已构建过,本次跳过"
